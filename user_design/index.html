<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数智瞭望 - 用户登录</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
    :root {
      --primary: #3a86ff;
      --primary-hover: #265df5;
      --surface: #0f172a;
      --surface-light: #1e293b;
      --surface-card: #1e293bcc;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--surface);
      color: var(--text);
      overflow: hidden;
    }
    .glass {
      background: var(--surface-card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
    }
    .form-input {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
    }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(58, 134, 255, 0.15);
      outline: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(58, 134, 255, 0.3);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.4s ease, transform 0.4s ease; }
    .fade-enter-from { opacity: 0; transform: translateY(20px); }
    .fade-leave-to { opacity: 0; transform: translateY(-20px); }
    .slide-enter-active, .slide-leave-active { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-enter-from { opacity: 0; transform: translateX(40px); }
    .slide-leave-to { opacity: 0; transform: translateX(-40px); }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    .floating { animation: float 6s ease-in-out infinite; }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      animation: pulse-ring 2s ease-out infinite;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58,134,255,0.4) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

  <!-- 动态背景粒子 -->
  <canvas id="bgCanvas" class="fixed inset-0 w-full h-full pointer-events-none" style="z-index:0"></canvas>

  <div id="app" class="relative z-10 w-full max-w-[440px] mx-4">

    <!-- 卡片 -->
    <div class="glass rounded-2xl p-8 shadow-2xl">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 border border-blue-500/30 mb-4 relative pulse-ring">
          <span class="material-symbols-outlined text-3xl text-blue-400">school</span>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">数智瞭望系统</h1>
        <p class="text-sm text-slate-400 mt-1">西华师范大学数据智能平台</p>
      </div>

      <!-- 切换标签 -->
      <div class="flex p-1 rounded-xl bg-slate-800/50 mb-6 border border-slate-700/50">
        <button
          @click="mode='login'"
          :class="mode==='login' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-white'"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300"
        >登录</button>
        <button
          @click="mode='register'"
          :class="mode==='register' ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-400 hover:text-white'"
          class="flex-1 py-2 text-sm font-medium rounded-lg transition-all duration-300"
        >注册</button>
      </div>

      <!-- 登录表单 -->
      <transition name="slide" mode="out-in">
        <form v-if="mode==='login'" @submit.prevent="handleLogin" key="login" class="space-y-5">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">账号</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">person</span>
              <input v-model="loginForm.username" type="text" class="form-input w-full pl-10 pr-4 py-2.5 rounded-xl text-sm text-white placeholder-slate-500" placeholder="请输入用户名" required />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">lock</span>
              <input v-model="loginForm.password" :type="showPassword ? 'text' : 'password'" class="form-input w-full pl-10 pr-10 py-2.5 rounded-xl text-sm text-white placeholder-slate-500" placeholder="请输入密码" required />
              <button type="button" @click="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-lg">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
              </button>
            </div>
          </div>
          <div class="flex items-center justify-between text-xs">
            <label class="flex items-center gap-2 cursor-pointer text-slate-400 hover:text-white transition-colors">
              <input type="checkbox" v-model="rememberMe" class="rounded border-slate-600 bg-slate-800 text-blue-500 focus:ring-blue-500/30" />
              <span>记住我</span>
            </label>
            <a href="#" class="text-blue-400 hover:text-blue-300 transition-colors">忘记密码?</a>
          </div>
          <button type="submit" :disabled="loginLoading" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white flex items-center justify-center gap-2">
            <span v-if="loginLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span>{{ loginLoading ? '登录中...' : '登录' }}</span>
          </button>
        </form>

        <!-- 注册表单 -->
        <form v-else @submit.prevent="handleRegister" key="register" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">账号</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">person_outline</span>
              <input v-model="registerForm.username" type="text" class="form-input w-full pl-10 pr-4 py-2 rounded-xl text-sm text-white placeholder-slate-500" placeholder="3-50位字母数字" required minlength="3" maxlength="50" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">昵称</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">badge</span>
              <input v-model="registerForm.nickname" type="text" class="form-input w-full pl-10 pr-4 py-2 rounded-xl text-sm text-white placeholder-slate-500" placeholder="你的昵称" />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">邮箱</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">mail</span>
              <input v-model="registerForm.email" type="email" class="form-input w-full pl-10 pr-4 py-2 rounded-xl text-sm text-white placeholder-slate-500" placeholder="用于接收验证码" required />
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">验证码</label>
            <div class="flex gap-2">
              <div class="relative flex-1">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">pin</span>
                <input v-model="registerForm.verifyCode" type="text" class="form-input w-full pl-10 pr-4 py-2 rounded-xl text-sm text-white placeholder-slate-500 tracking-widest" placeholder="6位验证码" required maxlength="6" />
              </div>
              <button type="button" @click="sendCode" :disabled="codeCountdown > 0 || codeLoading" class="btn-primary px-4 py-2 rounded-xl text-sm font-medium text-white whitespace-nowrap min-w-[110px] flex items-center justify-center">
                <span v-if="codeLoading" class="w-3.5 h-3.5 border-2 border-white/30 border-t-white rounded-full animate-spin mr-1.5"></span>
                <span>{{ codeCountdown > 0 ? codeCountdown + 's' : '获取验证码' }}</span>
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">密码</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-lg">lock_outline</span>
              <input v-model="registerForm.password" :type="showPassword ? 'text' : 'password'" class="form-input w-full pl-10 pr-10 py-2 rounded-xl text-sm text-white placeholder-slate-500" placeholder="至少6位密码" required minlength="6" />
              <button type="button" @click="showPassword = !showPassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-lg">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
              </button>
            </div>
          </div>
          <button type="submit" :disabled="registerLoading" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white flex items-center justify-center gap-2 mt-2">
            <span v-if="registerLoading" class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span>{{ registerLoading ? '注册中...' : '注册账号' }}</span>
          </button>
        </form>
      </transition>

      <!-- 提示消息 -->
      <transition name="fade">
        <div v-if="toast.show" :class="toast.type==='error' ? 'bg-red-500/10 border-red-500/30 text-red-400' : 'bg-green-500/10 border-green-500/30 text-green-400'" class="mt-5 px-4 py-3 rounded-xl border text-sm flex items-center gap-2">
          <span class="material-symbols-outlined text-lg">{{ toast.type==='error' ? 'error' : 'check_circle' }}</span>
          <span>{{ toast.message }}</span>
        </div>
      </transition>
    </div>

    <!-- 底部 -->
    <p class="text-center text-xs text-slate-600 mt-6">
      &copy; 2026 西华师范大学 · 数智瞭望系统
    </p>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;

    const API_BASE = '/api/v1';

    createApp({
      setup() {
        const mode = ref('login');
        const showPassword = ref(false);
        const rememberMe = ref(false);
        const loginLoading = ref(false);
        const registerLoading = ref(false);
        const codeLoading = ref(false);
        const codeCountdown = ref(0);

        const loginForm = reactive({ username: '', password: '' });
        const registerForm = reactive({ username: '', nickname: '', email: '', verifyCode: '', password: '' });

        const toast = reactive({ show: false, message: '', type: 'error' });
        let toastTimer = null;

        function showToast(message, type = 'error') {
          toast.show = false;
          clearTimeout(toastTimer);
          setTimeout(() => {
            toast.message = message;
            toast.type = type;
            toast.show = true;
            toastTimer = setTimeout(() => { toast.show = false; }, 4000);
          }, 100);
        }

        async function handleLogin() {
          if (!loginForm.username || !loginForm.password) {
            showToast('请填写完整信息');
            return;
          }
          loginLoading.value = true;
          try {
            const res = await fetch(`${API_BASE}/user/login`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(loginForm)
            });
            const data = await res.json();
            if (data.code === 200 && data.data) {
              localStorage.setItem('user_token', data.data.access_token);
              localStorage.setItem('user_info', JSON.stringify(data.data.user));
              showToast('登录成功，正在跳转...', 'success');
              setTimeout(() => {
                window.location.href = '/user/';
              }, 1500);
            } else {
              showToast(data.message || '登录失败');
            }
          } catch (e) {
            showToast('网络错误，请稍后重试');
            console.error(e);
          } finally {
            loginLoading.value = false;
          }
        }

        async function sendCode() {
          if (!registerForm.email) {
            showToast('请先填写邮箱');
            return;
          }
          codeLoading.value = true;
          try {
            const res = await fetch(`${API_BASE}/user/send-code`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: registerForm.email })
            });
            const data = await res.json();
            if (data.code === 200) {
              showToast(data.message || '验证码已发送', 'success');
              codeCountdown.value = 60;
              const timer = setInterval(() => {
                codeCountdown.value--;
                if (codeCountdown.value <= 0) clearInterval(timer);
              }, 1000);
            } else {
              showToast(data.message || '发送失败');
            }
          } catch (e) {
            showToast('网络错误');
          } finally {
            codeLoading.value = false;
          }
        }

        async function handleRegister() {
          if (!registerForm.username || !registerForm.password || !registerForm.email || !registerForm.verifyCode) {
            showToast('请填写完整信息');
            return;
          }
          registerLoading.value = true;
          try {
            const res = await fetch(`${API_BASE}/user/register`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                username: registerForm.username,
                password: registerForm.password,
                nickname: registerForm.nickname,
                email: registerForm.email,
                verify_code: registerForm.verifyCode
              })
            });
            const data = await res.json();
            if (data.code === 200) {
              showToast('注册成功，请登录', 'success');
              setTimeout(() => { mode.value = 'login'; }, 1200);
            } else {
              showToast(data.message || '注册失败');
            }
          } catch (e) {
            showToast('网络错误，请稍后重试');
          } finally {
            registerLoading.value = false;
          }
        }

        return {
          mode, showPassword, rememberMe,
          loginLoading, registerLoading, codeLoading, codeCountdown,
          loginForm, registerForm,
          toast,
          handleLogin, sendCode, handleRegister
        };
      }
    }).mount('#app');

    // 背景粒子动画
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];
      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = (Math.random() - 0.5) * 0.3;
          this.radius = Math.random() * 2 + 0.5;
          this.alpha = Math.random() * 0.5 + 0.1;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > w || this.y < 0 || this.y > h) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(58, 134, 255, ${this.alpha})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < 60; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, w, h);
        // 连线
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(58, 134, 255, ${0.1 * (1 - dist / 150)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
